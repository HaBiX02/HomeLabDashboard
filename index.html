<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Panel de control para servicios locales">
    <title>HomeLab Dashboard</title>
    <!-- Modern Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Icons (Material Symbols Outlined for simplicity and aesthetics) -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
        <div class="globe globe-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-content">
                <h1>HomeLab <span class="accent">Dashboard</span></h1>
                <div id="clock" class="clock">00:00:00</div>
            </div>
            <div class="search-container">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" id="searchInput" placeholder="Buscar servicio...">
            </div>
        </header>

        <main id="servicesGrid">
            <!-- Services will be injected here or hardcoded below -->

            <!-- Syncthing -->
            <a href="http://localhost:8384" target="_blank" class="card" data-name="syncthing file synchronization">
                <div class="card-icon syncthing-bg">
                    <span class="material-symbols-outlined">sync_alt</span>
                </div>
                <div class="card-info">
                    <h3>Syncthing</h3>
                    <p>:8384</p>
                </div>
            </a>

            <!-- Overleaf -->
            <a href="http://localhost:80" target="_blank" class="card" data-name="overleaf latex editor sharelatex">
                <div class="card-icon overleaf-bg">
                    <span class="material-symbols-outlined">article</span>
                </div>
                <div class="card-info">
                    <h3>Overleaf</h3>
                    <p>:80</p>
                </div>
            </a>

        </main>

        <footer>
            <p>Panel Personal &copy; <span id="year"></span></p>
        </footer>
    </div>

    <!-- Local JS -->
    <script src="js/app.js"></script>
</body>

</html>
